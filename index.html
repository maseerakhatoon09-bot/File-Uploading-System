!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>File Uploading System</title>

  <!-- CSS File -->
  <link rel="stylesheet" href="style2.css">
</head>

<body>

  <h1>File Uploading System</h1>

  <div class="container">

    <!-- Upload Section -->
    <div class="card">
      <h2>Upload File</h2>

      <div class="upload-section">
        <input type="file" id="fileInput">

        <button class="upload-btn" onclick="uploadFile()">
          Upload
        </button>
      </div>
    </div>

    <!-- Uploaded Files -->
    <div class="card">
      <h2>Uploaded Files</h2>

      <table>
        <thead>
          <tr>
            <th>File Name</th>
            <th>Size</th>
            <th>Action</th>
          </tr>
        </thead>

        <tbody id="fileTableBody">
            
        </tbody>
      </table>
    </div>

  </div>

  <!-- JavaScript File -->
  <script src="script1.js"></script>

</body>
</html>
